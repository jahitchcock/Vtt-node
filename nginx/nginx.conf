# VTT-Node | nginx/nginx.conf - Post-review (rate limit fixed)
user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events { worker_connections 1024; use epoll; multi_accept on; }

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    log_format main '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent";
    access_log /var/log/nginx/access.log main;
    sendfile on; tcp_nopush on; tcp_nodelay on;
    keepalive_timeout 120;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 500M;
    client_body_timeout 300s;
    client_body_buffer_size 128k;
    map $http_upgrade $connection_upgrade { default upgrade; '' close; }
    gzip on; gzip_vary on; gzip_proxied any; gzip_comp_level 4;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    # API: 10r/s (fixed from 30r/m -- dashboard polls frequently)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/m;
    include /etc/nginx/conf.d/*.conf;
}